services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: socopro_db
      POSTGRES_USER: socopro_user
      POSTGRES_PASSWORD: socopro_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      DJANGO_SECRET_KEY: change-me-in-production-use-strong-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: socopro_db
      POSTGRES_USER: socopro_user
      POSTGRES_PASSWORD: socopro_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080,http://localhost
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  media_data:
  static_data:
